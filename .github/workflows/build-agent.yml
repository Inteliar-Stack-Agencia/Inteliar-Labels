name: Build Printer Agent

on:
  push:
    paths:
      - 'printer-agent/**'
      - '.github/workflows/build-agent.yml'
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Skip the optional native serialport build — not needed for the .exe.
      # Serial support is loaded dynamically at runtime if the user installs it.
      - name: Install dependencies
        working-directory: printer-agent
        run: npm install --omit=optional

      # @yao-pkg/pkg is the maintained pkg fork that supports ESM + Node 20.
      - name: Build Windows exe
        working-directory: printer-agent
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InteliarPrinterAgent-win
          path: printer-agent/dist/InteliarPrinterAgent.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: agent-v${{ github.run_number }}
          name: "Printer Agent v${{ github.run_number }}"
          body: |
            ## Inteliar Printer Agent v2 para Windows

            Agente local que conecta el SaaS con tus impresoras térmicas
            (TCP/IP, USB, Serie). Soporta múltiples impresoras y marcas.

            ### Instalación
            1. Descargá `InteliarPrinterAgent.exe`
            2. Ejecutalo (doble clic). Queda escuchando en `http://localhost:9638`
            3. En la app web → **Configuración → Impresoras**, agregá tu impresora
               (la app detecta el agente automáticamente)

            > No requiere instalar Node.js. La configuración se guarda en
            > `printers.json`, junto al .exe.
          files: printer-agent/dist/InteliarPrinterAgent.exe
