<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      padding: 24px;
      user-select: none;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo {
      width: 40px; height: 40px;
      background: #0ea5e9;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; color: #71717a; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
      margin-bottom: 20px;
      width: 100%;
    }
    .status-badge.running { background: rgba(34,197,94,0.12); color: #4ade80; }
    .status-badge.stopped { background: rgba(113,113,122,0.12); color: #a1a1aa; }
    .status-badge.error { background: rgba(239,68,68,0.12); color: #f87171; }
    .status-badge.starting { background: rgba(234,179,8,0.12); color: #facc15; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    .row {
      display: flex; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #18181b;
      font-size: 13px;
    }
    .row .label { color: #a1a1aa; }
    .row .value { font-weight: 500; }
    .row .value.mono { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }

    .actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    button {
      width: 100%;
      padding: 11px;
      border: 1px solid #27272a;
      border-radius: 10px;
      background: #18181b;
      color: #fafafa;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: #27272a; }
    button.primary { background: #0ea5e9; border-color: #0ea5e9; }
    button.primary:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🏷️</div>
    <div>
      <h1>Inteliar Printer Agent</h1>
      <p id="version">v1.0.0</p>
    </div>
  </div>

  <div class="status-badge" id="badge">
    <span class="dot"></span>
    <span id="status-text">Cargando...</span>
  </div>

  <div id="error-box" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px; margin-bottom:20px; font-size:12px; color:#fca5a5; line-height:1.5;"></div>

  <div class="info">
    <div class="row">
      <span class="label">Puerto local</span>
      <span class="value mono" id="port">9638</span>
    </div>
    <div class="row">
      <span class="label">Plan</span>
      <span class="value" id="plan">—</span>
    </div>
    <div class="row">
      <span class="label">Dispositivos</span>
      <span class="value" id="devices">—</span>
    </div>
    <div class="row">
      <span class="label">Licencia</span>
      <span class="value mono" id="license">—</span>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="config">🖨 Conectar mi impresora a Inteliar Labels</button>
    <button id="restart">🔄 Reiniciar agente</button>
  </div>

  <script>
    const badge = document.getElementById('badge')
    const statusText = document.getElementById('status-text')

    const STATUS = {
      running:  { cls: 'running',  text: 'Agente activo' },
      stopped:  { cls: 'stopped',  text: 'Agente detenido' },
      error:    { cls: 'error',    text: 'Error en el agente' },
      starting: { cls: 'starting', text: 'Iniciando...' },
    }

    async function refresh() {
      const s = await window.agent.getStatus()
      const st = STATUS[s.agentStatus] || STATUS.stopped
      badge.className = 'status-badge ' + st.cls
      statusText.textContent = st.text

      const errBox = document.getElementById('error-box')
      if (s.agentStatus === 'error' && s.agentError) {
        errBox.style.display = 'block'
        errBox.textContent = s.agentError
      } else {
        errBox.style.display = 'none'
      }
      document.getElementById('version').textContent = 'v' + s.version
      document.getElementById('port').textContent = s.port
      if (s.licenseInfo) {
        document.getElementById('plan').textContent =
          s.licenseInfo.plan === 'lifetime' ? 'De por vida' : 'Mensual'
        document.getElementById('devices').textContent =
          s.licenseInfo.max_devices ? `${s.licenseInfo.devices_used}/${s.licenseInfo.max_devices}` : '—'
        const key = s.licenseInfo.key || ''
        document.getElementById('license').textContent =
          key ? key.slice(0, 13) + '••••' : '—'
      }
    }

    document.getElementById('config').addEventListener('click', () => window.agent.openConfig())
    document.getElementById('restart').addEventListener('click', async () => {
      await window.agent.restartAgent()
      setTimeout(refresh, 1500)
    })

    refresh()
    setInterval(refresh, 3000)
  </script>
</body>
</html>
